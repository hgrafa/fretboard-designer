<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fretboard body -->
  <rect x="8" y="16" width="48" height="32" rx="3" fill="#1a1a1a"/>
  <!-- Frets -->
  <line x1="20" y1="16" x2="20" y2="48" stroke="#555" stroke-width="1.5"/>
  <line x1="32" y1="16" x2="32" y2="48" stroke="#555" stroke-width="1.5"/>
  <line x1="44" y1="16" x2="44" y2="48" stroke="#555" stroke-width="1.5"/>
  <!-- Strings -->
  <line x1="8" y1="22" x2="56" y2="22" stroke="#999" stroke-width="0.8"/>
  <line x1="8" y1="28" x2="56" y2="28" stroke="#999" stroke-width="1"/>
  <line x1="8" y1="34" x2="56" y2="34" stroke="#999" stroke-width="1.2"/>
  <line x1="8" y1="40" x2="56" y2="40" stroke="#999" stroke-width="1.4"/>
  <!-- Nut -->
  <rect x="7" y="15" width="3" height="34" rx="1" fill="#e5e5e5"/>
  <!-- Note dots -->
  <circle cx="26" cy="22" r="4" fill="#f43f5e"/>
  <circle cx="38" cy="34" r="4" fill="#f43f5e"/>
  <circle cx="14" cy="40" r="4" fill="#1a1a1a" stroke="#e5e5e5" stroke-width="1.5"/>
  <circle cx="50" cy="28" r="4" fill="#1a1a1a" stroke="#e5e5e5" stroke-width="1.5"/>
</svg>
